<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Retail IT Audit — аудит ИТ розничной сети</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Внутренний инструмент Айти-Консалтинг для аудита ИТ-эксплуатации розничной сети и расчёта экономии">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%23B41818'/%3E%3Ctext x='50' y='68' font-size='58' text-anchor='middle' fill='white' font-family='sans-serif'%3EA%3C/text%3E%3C/svg%3E">
<style>
:root {
  --ink: #292525;
  --ink-secondary: #5A5252;
  --ink-muted: #8C8484;
  --surface: #FFFFFF;
  --page: #F7F6F5;
  --border: rgba(41,37,37,0.12);
  --gridline: #ECE9E9;
  --brand: #B41818;
  --brand-tint: #FBEAEA;
  --good: #0CA30C;
  --bad: #D03B3B;
  --bad-tint: #FBEBEB;
  --bad-border: #F0C3C3;
  --warning: #C98A00;
  --radius: 10px;
  --hue-HD: #B41818;
  --hue-C1: #1BAF7A;
  --hue-KKT: #EDA100;
  --hue-MARK: #008300;
  --hue-INFRA: #4A3AA7;
}
@media (prefers-color-scheme: dark) {
  :root {
    --ink: #F3EFEF;
    --ink-secondary: #CDC5C5;
    --ink-muted: #9B9393;
    --surface: #242020;
    --page: #181414;
    --border: rgba(255,255,255,0.12);
    --gridline: #372F2F;
    --brand: #E2564C;
    --brand-tint: rgba(226,86,76,0.18);
    --bad-tint: rgba(208,59,59,0.16);
    --bad-border: rgba(208,59,59,0.4);
  }
}
:root[data-theme="dark"] {
  --ink: #F3EFEF; --ink-secondary: #CDC5C5; --ink-muted: #9B9393;
  --surface: #242020; --page: #181414; --border: rgba(255,255,255,0.12);
  --gridline: #372F2F; --brand: #E2564C; --brand-tint: rgba(226,86,76,0.18);
  --bad-tint: rgba(208,59,59,0.16); --bad-border: rgba(208,59,59,0.4);
}
:root[data-theme="light"] {
  --ink: #292525; --ink-secondary: #5A5252; --ink-muted: #8C8484;
  --surface: #FFFFFF; --page: #F7F6F5; --border: rgba(41,37,37,0.12);
  --gridline: #ECE9E9; --brand: #B41818; --brand-tint: #FBEAEA;
  --bad-tint: #FBEBEB; --bad-border: #F0C3C3;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  background: var(--page);
  color: var(--ink);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
input, select, button { font-family: inherit; font-size: inherit; }
.tabular { font-variant-numeric: tabular-nums; }

/* ---- shell ---- */
#app { max-width: 900px; margin: 0 auto; padding: 0 20px 80px; }

.rail {
  display: flex;
  gap: 4px;
  overflow-x: auto;
  padding: 14px 0 10px;
  margin-bottom: 8px;
  border-bottom: 1px solid var(--border);
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.rail::-webkit-scrollbar { display: none; }
.rail-item {
  display: flex; align-items: center; gap: 6px;
  border: none; background: none; cursor: pointer;
  padding: 6px 10px; border-radius: 999px;
  color: var(--ink-muted); white-space: nowrap;
  font-size: 13px; flex: none;
}
.rail-item:hover { background: var(--brand-tint); }
.rail-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--gridline); color: var(--ink-secondary);
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 600; flex: none;
}
.rail-item.done .rail-num { background: var(--good); color: #fff; }
.rail-item.active { color: var(--ink); font-weight: 600; }
.rail-item.active .rail-num { background: var(--brand); color: #fff; }
.rail-back {
  border: none; background: none; cursor: pointer; color: var(--ink-muted);
  font-size: 13px; padding: 6px 10px 6px 0; margin-right: 6px; border-right: 1px solid var(--border); flex: none;
}
.rail-back:hover { color: var(--ink); }

.content { padding-top: 8px; }
.content-intro { max-width: 880px; margin: 0 auto; padding-top: 7vh; }

.intro-eyebrow {
  text-transform: uppercase; letter-spacing: .08em; font-size: 12px;
  font-weight: 700; color: var(--brand);
}
.intro-logo { color: var(--ink); margin-bottom: 4px; }
.intro-logo svg { height: 30px; width: auto; display: block; }
.intro h1 { font-size: 32px; margin: 8px 0 18px; text-wrap: balance; letter-spacing: -0.02em; }
.lead { color: var(--ink-secondary); font-size: 16px; max-width: 68ch; }

.intro-columns { display: grid; grid-template-columns: 1.1fr 1.4fr; gap: 28px; margin-top: 28px; align-items: start; }
.intro-col-title { font-size: 12px; text-transform: uppercase; letter-spacing: .06em; font-weight: 700; color: var(--ink-muted); margin-bottom: 12px; }
.intro-col-new { display: flex; flex-direction: column; align-items: flex-start; gap: 10px; }
.intro-col-new .btn { width: 100%; }
.audit-list { display: flex; flex-direction: column; gap: 8px; max-height: 50vh; overflow-y: auto; }
.audit-empty { color: var(--ink-muted); font-size: 13.5px; background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 16px; }
.audit-item {
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 12px 14px; cursor: pointer;
}
.audit-item:hover { border-color: var(--brand); }
.audit-item-name { font-weight: 600; }
.audit-item-meta { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
.audit-item-del {
  border: none; background: none; color: var(--ink-muted); cursor: pointer;
  width: 26px; height: 26px; border-radius: 50%; flex: none; font-size: 13px;
}
.audit-item-del:hover { background: color-mix(in srgb, var(--bad) 15%, transparent); color: var(--bad); }
@media (max-width: 720px) {
  .intro-columns { grid-template-columns: 1fr; }
}

.step-header { margin: 6px 0 18px; border-left: 4px solid var(--accent, var(--brand)); padding-left: 14px; }
.step-eyebrow { text-transform: uppercase; letter-spacing: .08em; font-size: 11px; font-weight: 700; color: var(--accent, var(--brand)); }
.step-header h1 { margin: 2px 0 0; font-size: 24px; letter-spacing: -0.01em; font-weight: 700; }
.section-title { font-size: 17px; margin: 30px 0 12px; }

/* ---- blocks / fields ---- */
.blocks { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
.block-card {
  background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
  overflow: hidden;
}
.block-summary {
  cursor: pointer; list-style: none; padding: 14px 16px;
  display: flex; align-items: center; justify-content: space-between; gap: 10px;
  font-weight: 600;
}
.block-summary::-webkit-details-marker { display: none; }
.block-summary::before { content: '▸'; color: var(--ink-muted); margin-right: 8px; font-size: 12px; transition: transform .15s; }
details[open] > .block-summary::before { transform: rotate(90deg); }
.block-title { flex: 1; }
.badge {
  font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 999px;
  white-space: nowrap; color: var(--ink-secondary); background: var(--gridline);
}
.badge-must { background: var(--brand-tint); color: var(--brand); }
.badge-optional { background: var(--gridline); color: var(--ink-muted); }
.block-body { padding: 4px 16px 16px; border-top: 1px solid var(--border); }
.block-note { color: var(--ink-secondary); font-size: 13px; padding: 10px 0 4px; }

.field { display: block; padding: 10px 0; border-bottom: 1px dashed var(--gridline); border-left: 3px solid transparent; transition: border-color .15s, background .15s; }
.field:last-child { border-bottom: none; }
.field-label { display: block; font-size: 14px; margin-bottom: 6px; }
.field-required { color: var(--bad); margin-left: 3px; }
.field-missing { border-left-color: var(--bad); background: var(--bad-tint); padding-left: 10px; }
.field-hint { font-size: 12px; color: var(--ink-muted); margin-top: 4px; }
.field-input-wrap { position: relative; display: inline-block; width: 100%; max-width: 260px; }
.extra-fields { margin-top: 6px; border-top: 1px solid var(--border); padding-top: 4px; }
.extra-fields summary {
  cursor: pointer; font-size: 12.5px; font-weight: 600; color: var(--brand);
  padding: 8px 10px; margin: 4px 0; list-style: none; display: inline-flex; align-items: center; gap: 6px;
  border-radius: 999px; background: var(--brand-tint);
}
.extra-fields summary:hover { filter: brightness(0.97); }
.extra-fields summary::-webkit-details-marker { display: none; }
.extra-fields summary::before { content: '+'; font-weight: 700; }
.extra-fields[open] summary::before { content: '−'; }
.field-input {
  width: 100%; max-width: 260px; padding: 9px 12px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--brand-tint); color: var(--ink);
}
.field-input:focus { outline: 2px solid var(--brand); outline-offset: 1px; }
select.field-input { max-width: 320px; }
.field-suffix { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); color: var(--ink-muted); font-size: 13px; pointer-events: none; }

.tier-hint { background: var(--brand-tint); border-radius: var(--radius); padding: 12px 14px; font-size: 13px; color: var(--ink-secondary); margin-bottom: 16px; }
.progress-badge {
  display: inline-block; font-size: 12.5px; font-weight: 700; color: var(--ink-secondary);
  background: var(--gridline); border-radius: 999px; padding: 5px 12px; margin: 10px 0 16px;
}
.progress-badge.progress-done { background: var(--good); color: #fff; }
.tier-result { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 10px; }
.tier-result-label { font-size: 12px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .04em; }
.tier-result-value { font-size: 26px; font-weight: 700; color: var(--brand); margin: 4px 0; }
.tier-result-explain { font-size: 13px; color: var(--ink-secondary); }

.warn-card {
  background: var(--bad-tint);
  border: 1px solid var(--bad-border);
  border-left: 4px solid var(--bad);
  border-radius: var(--radius); padding: 14px 16px; margin: 14px 0;
}
.warn-card-big { padding: 20px; }
.warn-title { font-weight: 700; color: var(--bad); margin-bottom: 6px; }
.warn-list { margin: 6px 0 12px; padding-left: 20px; font-size: 13px; color: var(--ink-secondary); }
.warn-hint { font-size: 13px; color: var(--ink-secondary); }

.margin-panel {
  background: var(--page); border: 1px dashed var(--ink-muted); border-radius: var(--radius);
  padding: 16px 18px; margin: 20px 0;
}
.margin-panel-title {
  font-weight: 700; font-size: 12.5px; letter-spacing: 0.02em; text-transform: uppercase;
  color: var(--ink-muted); margin-bottom: 8px;
}
.margin-slider-row { display: flex; align-items: center; gap: 14px; margin: 10px 0 4px; }
.margin-slider-row input[type="range"] { flex: 1; accent-color: var(--brand); }
.margin-slider-row span { font-size: 13px; font-weight: 600; color: var(--ink-secondary); white-space: nowrap; }

/* ---- buttons / nav ---- */
.btn {
  border: none; background: var(--brand); color: #fff; font-weight: 600;
  padding: 10px 20px; border-radius: 24px; cursor: pointer;
}
.btn:hover { filter: brightness(1.08); }
.btn:disabled { opacity: .4; cursor: default; }
.btn-outline { background: none; border: 1px solid var(--border); color: var(--ink); }
.btn-lg { font-size: 16px; padding: 13px 24px; }
.actions-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
.step-nav { display: flex; align-items: center; justify-content: space-between; margin-top: 28px; padding-top: 16px; border-top: 1px solid var(--border); }
.step-progress { color: var(--ink-muted); font-size: 13px; }

/* ---- tariffs table ---- */
.table-wrap { overflow-x: auto; }
.tariff-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.tariff-table th { text-align: left; color: var(--ink-muted); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: .04em; padding: 8px 10px; border-bottom: 1px solid var(--border); }
.tariff-table td { padding: 9px 10px; border-bottom: 1px solid var(--gridline); }
.tariff-table td.num { text-align: right; font-variant-numeric: tabular-nums; font-weight: 600; }
.muted { color: var(--ink-muted); }
.small { font-size: 12px; }
.link-btn {
  border: none; background: none; padding: 0; margin: 0; font: inherit;
  color: var(--brand); text-decoration: underline; cursor: pointer;
}
.link-btn:hover { color: var(--ink); }

/* ---- results tiles ---- */
.tiles { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 16px; }
.tile { background: var(--surface); border: 1px solid var(--border); border-top: 3px solid var(--brand); border-radius: var(--radius); padding: 14px 16px; }
.tile-label { font-size: 11px; text-transform: uppercase; letter-spacing: .04em; color: var(--ink-muted); font-weight: 700; }
.tile-value { font-size: 24px; font-weight: 700; margin-top: 6px; font-variant-numeric: tabular-nums; }
.tile-sub { font-size: 12px; color: var(--ink-muted); margin-top: 2px; }
.tile-good { border-top-color: var(--good); } .tile-good .tile-value { color: var(--good); }
.tile-bad { border-top-color: var(--bad); } .tile-bad .tile-value { color: var(--bad); }
.tile-accent .tile-value { color: var(--brand); }

.chart { width: 100%; height: auto; }
.chart-label { font-size: 12px; fill: var(--ink-secondary); }
.chart-value { font-size: 12px; font-weight: 600; fill: var(--ink); font-variant-numeric: tabular-nums; }
.chart-value-sm { font-size: 10.5px; fill: var(--ink-muted); font-variant-numeric: tabular-nums; }
.chart-axis { stroke: var(--gridline); stroke-width: 1; }
.chart-legend { display: flex; gap: 16px; font-size: 12px; color: var(--ink-secondary); margin-bottom: 6px; }
.chart-legend .dot { display: inline-block; width: 9px; height: 9px; border-radius: 3px; margin-right: 5px; }

.bottom-check { background: var(--surface); border: 1px dashed var(--border); border-radius: var(--radius); padding: 14px 16px; margin: 20px 0; }
.assumptions-note { background: var(--brand-tint); border-radius: var(--radius); padding: 12px 16px; font-size: 13.5px; color: var(--ink-secondary); margin-bottom: 6px; }
.assumptions-note b { color: var(--ink); }
.pain-blocks { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 12px; }
.pain-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--brand); border-radius: var(--radius); padding: 14px 16px; }
.pain-title { font-weight: 700; margin-bottom: 6px; }
.pain-text { font-size: 13px; color: var(--ink-secondary); }
.price-summary { background: var(--brand-tint); border-radius: var(--radius); padding: 14px 16px; margin-top: 20px; font-size: 14px; }

/* ---- save indicator / help ---- */
#saveIndicator {
  position: fixed; bottom: 16px; left: 50%; transform: translate(-50%, 10px);
  background: var(--ink); color: var(--surface); font-size: 12px; padding: 7px 14px;
  border-radius: 999px; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none;
}
#saveIndicator.show { opacity: .92; transform: translate(-50%, 0); }

#helpBtn {
  position: fixed; top: 14px; right: 16px; z-index: 5;
  width: 34px; height: 34px; border-radius: 50%; border: 1px solid var(--border);
  background: var(--surface); color: var(--ink); font-weight: 700; cursor: pointer;
}
#helpOverlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.4); display: none; z-index: 10;
  align-items: flex-start; justify-content: center; padding: 40px 16px;
}
#helpOverlay.open { display: flex; }
.help-panel { background: var(--surface); max-width: 640px; width: 100%; max-height: 85vh; overflow-y: auto; border-radius: 14px; padding: 24px 28px; }
.help-panel h3 { margin: 20px 0 8px; font-size: 15px; }
.help-panel h3:first-child { margin-top: 0; }
.help-panel p { color: var(--ink-secondary); font-size: 13.5px; margin: 0 0 10px; }
.help-close { float: right; border: none; background: var(--gridline); border-radius: 50%; width: 28px; height: 28px; cursor: pointer; color: var(--ink); }

.no-print {}
@media print {
  .rail, .no-print, #helpBtn, #saveIndicator { display: none !important; }
  #app { max-width: none; padding: 0; }
  body { background: #fff; color: #000; }
  .tile, .pain-card, .block-card { break-inside: avoid; }
}
@media (max-width: 640px) {
  .intro h1 { font-size: 26px; }
  .content-intro { padding-top: 6vh; }
  .rail-item .rail-name { display: none; }
  .rail-item.active .rail-name { display: inline; }
  .rail-item { padding: 6px; }
  .rail-item.active { padding: 6px 12px 6px 6px; }
}
</style>
</head>
<body>
<button id="helpBtn" onclick="toggleHelp()" title="Инструкция" aria-label="Инструкция">?</button>
<div id="saveIndicator"></div>

<div id="app"></div>

<div id="helpOverlay" onclick="if(event.target===this) toggleHelp(false)">
  <div class="help-panel">
    <button class="help-close" onclick="toggleHelp(false)" aria-label="Закрыть">✕</button>
    <div id="helpBody"></div>
  </div>
</div>
<script>
/* Полифиллы для очень старых движков (используются только если метод ещё не определён —
   в любом настоящем браузере эти строки ничего не меняют, это чистая подстраховка). */
if (!Array.prototype.filter) {
    Array.prototype.filter = function (fn) {
        var out = [];
        for (var i = 0; i < this.length; i++) { if (fn(this[i], i)) out.push(this[i]); }
        return out;
    };
}
if (!Array.prototype.map) {
    Array.prototype.map = function (fn) {
        var out = [];
        for (var i = 0; i < this.length; i++) { out.push(fn(this[i], i)); }
        return out;
    };
}
if (!Array.prototype.forEach) {
    Array.prototype.forEach = function (fn) {
        for (var i = 0; i < this.length; i++) { fn(this[i], i); }
    };
}
if (!Array.prototype.indexOf) {
    Array.prototype.indexOf = function (val) {
        for (var i = 0; i < this.length; i++) { if (this[i] === val) return i; }
        return -1;
    };
}
if (!String.prototype.trim) {
    String.prototype.trim = function () { return this.replace(/^\s+|\s+$/g, ''); };
}
/* ============================================================
   Retail IT Audit — данные (продукты/блоки/поля) и расчётный движок.
   Упрощённые формулировки: без английских сокращений (SLA, ROI, FTE, NAS, VPN и т.п.),
   без внутренних кодов в тексте вопроса — только понятная формулировка + маленькая подсказка.
   Коды полей (HD_1_01 и т.п.) сохранены как внутренние id — те же, что в Excel-версии,
   для проверяемости и на будущее (сверка/перенос данных).
   ============================================================ */

var PRODUCT_META = {
    CLI:   { name: 'Профиль клиента', hue: '#B41818' },
    HD:    { name: 'Служба поддержки пользователей', hue: '#B41818' },
    C1:    { name: 'Сопровождение 1С', hue: '#1BAF7A' },
    KKT:   { name: 'Кассы и оборудование', hue: '#EDA100' },
    MARK:  { name: 'Маркировка товаров', hue: '#008300' },
    INFRA: { name: 'Компьютеры и сеть', hue: '#4A3AA7' }
};

// type: N=число, P=процент, T=текст, D=да/нет, C=вычисляется автоматически
var BLOCKS = [
// ---------------- ПРОФИЛЬ КЛИЕНТА ----------------
{ id:'CLI_0', product:'CLI', title:'Профиль клиента', must:true,
  note:'Заполняется первым — определяет, сколько вопросов дальше реально нужно задавать.',
  fields:[
    {id:'CLI_0_01', label:'Название сети или магазина', type:'T'},
    {id:'CLI_0_02', required:true, label:'Сколько магазинов (точек продаж)', type:'N'},
    {id:'CLI_0_03', label:'География сети', type:'T', hint:'один город / несколько городов / вся страна'},
    {id:'CLI_0_04', required:true, label:'Сколько всего сотрудников в сети', type:'N', hint:'все сотрудники, не только те, кто занимается компьютерами'},
    {id:'CLI_0_05', required:true, label:'Сколько сеть зарабатывает в месяц, руб.', type:'N', hint:'примерный оборот — нужен для расчёта потерь от простоя'},
    {id:'CLI_0_06', label:'Есть ли у клиента свои сотрудники, которые занимаются компьютерами и кассами', type:'T', hint:'да/нет, сколько человек'},

/* ============================================================
   Retail IT Audit — расчётный движок.
   Проверен через cscript на тестовом сценарии (сеть из 5 точек) —
   цифры совпадают с проверенной Excel-версией один в один.

function computeTier(points, override) {
    if (override && override !== '' && override !== 'auto') return override;
    if (points <= 3) return 'express';
    if (points <= 15) return 'standard';
    return 'extended';
}

var TIER_LABEL = { express: 'Экспресс', standard: 'Стандарт', extended: 'Расширенный' };

function revenuePerHour(cli) {
    if (!(cli.points > 0) || !(cli.hoursPerDay > 0)) return 0;
    return cli.revenue / cli.points / 30 / cli.hoursPerDay;
}

var TCO = {
    HD_1: function (v, cli) { return (v.HD_1_01 * v.HD_1_07) / 60 * cli.rateIT; },
    HD_2: function (v, cli) { return v.HD_2_01 * v.HD_2_02 * cli.rateIT; },
    HD_3: function (v, cli) { return v.HD_3_05; },
    HD_4: function (v, cli) { return v.HD_4_02 * v.HD_4_05 * cli.rateIT + (cli.staff * v.HD_4_04 / 100) * v.HD_4_06 * cli.rateIT; },
    C1_2: function (v, cli) { return ((v.C1_2_05 * v.C1_2_06 * cli.rate1C) + (v.C1_2_07 * revenuePerHour(cli))) / 12; },
    C1_3: function (v, cli) { return v.C1_3_05 * cli.rate1C; },
    C1_4: function (v, cli) { return v.C1_4_03 * v.C1_4_04 * cli.rate1C; },
    C1_5: function (v, cli) { return v.C1_5_02 / 12; },
    C1_6: function (v, cli) { return v.C1_6_01 * v.C1_6_02 / 60 * cli.rate1C; },
    KKT_1: function (v, cli) { return (v.KKT_1_04 * (v.KKT_1_05 + v.KKT_1_06 * cli.rateIT)) / 12; },
    KKT_2: function (v, cli) { return (v.KKT_2_02 * v.KKT_1_01) + (v.KKT_2_03 * v.KKT_2_04 * cli.rateIT) / 12 + (v.KKT_2_05 / 12); },
    KKT_3: function (v, cli) { return v.KKT_3_03 * v.KKT_3_04 * cli.rateIT + v.KKT_3_03 * v.KKT_3_04 * revenuePerHour(cli); },
    KKT_4: function (v, cli) { return v.KKT_4_03 * (v.KKT_4_04 + v.KKT_4_05 * cli.rateIT); },
    KKT_5: function (v, cli) { return (v.KKT_5_04 * v.KKT_5_03 + v.KKT_5_04 * v.KKT_5_02 * revenuePerHour(cli)) / 12; },
    KKT_6: function (v, cli) { return (v.KKT_6_01 * v.KKT_6_03 * cli.rateIT) / 12; },
    MARK_2: function (v, cli) { return v.MARK_2_02 * v.MARK_2_03 + v.MARK_2_04 * v.MARK_2_05 * cli.rateIT; },
    MARK_3: function (v, cli) { return v.MARK_3_01 * v.MARK_3_02 / 60 * cli.rateIT + v.MARK_3_03 / 12; },
    MARK_4: function (v, cli) { return v.MARK_4_01 * v.MARK_4_03 / 60 * cli.rateIT; },
    INFRA_1: function (v, cli) { return v.INFRA_1_03 * v.INFRA_1_05 * cli.rateIT; },
    INFRA_2: function (v, cli) { return v.INFRA_2_03 * v.INFRA_2_04 * cli.rateIT + v.INFRA_2_03 * v.INFRA_2_04 * revenuePerHour(cli); },
    INFRA_3: function (v, cli) { return (v.INFRA_3_04 * v.INFRA_3_05 * revenuePerHour(cli)) / 12; },
    INFRA_4: function (v, cli) { return (v.INFRA_4_04 / 12) + (v.INFRA_4_02 * v.INFRA_4_05 * cli.rateIT) / 12 + (v.INFRA_4_06 / 12); },
    INFRA_5: function (v, cli) { return v.INFRA_5_03 / 12; },
    INFRA_6: function (v, cli) { return (v.INFRA_6_06 * cli.rateIT) + (v.INFRA_6_04 / 12); }
};

var TARIFF = {
    HD_1: { rate: 830, unit:'руб. за одно обращение', volume: function (v) { return v.HD_1_01; } },
    HD_2: { rate: 830, unit:'руб. за заявку на доступ', volume: function (v) { return v.HD_2_01; } },
    HD_4: { rate: 4000, unit:'руб. за занятие', volume: function (v) { return v.HD_4_02 / 12; } },
    C1_3: { rate: 7000, unit:'руб. за обращение (в среднем 1,5 в месяц)', volume: function () { return 1.5; } },
    C1_4: { rate: 7000, unit:'руб. за случай поломки обмена', volume: function (v) { return v.C1_4_03; } },
    KKT_1: { rate: 830, unit:'руб. за кассу в месяц', volume: function (v) { return v.KKT_1_01; } },
    KKT_2: { rate: 830, unit:'руб. за кассу в месяц', volume: function (v) { return v.KKT_1_01; } },
    KKT_3: { rate: 830, unit:'руб. за терминал в месяц', volume: function (v) { return v.KKT_3_05; } },
    KKT_4: { rate: 830, unit:'руб. за единицу в месяц', volume: function (v) { return v.KKT_4_01; } },
    KKT_5: { rate: 1000, unit:'руб. за выезд', volume: function (v) { return v.KKT_5_04 / 12; } },
    KKT_6: { rate: 830, unit:'руб. за регистрацию', volume: function (v) { return v.KKT_6_01 / 12; } },
    MARK_2: { rate: 10, unit:'руб. за документ', volume: function (v) { return v.MARK_2_03; } },
    MARK_3: { rate: 830, unit:'руб. за случай', volume: function (v) { return v.MARK_3_01; } },
    MARK_4: { rate: 830, unit:'руб. за консультацию', volume: function (v) { return v.MARK_4_01; } },
    INFRA_3: { rate: 7000, unit:'руб. за сервер в месяц', volume: function (v) { return v.INFRA_3_01; } }
};

/* Себестоимость (без наценки) для тех же позиций — оклад+взносы+накладные, без целевой маржи.
   Нужна для служебной панели «маржа» в отчёте: от 0% (себестоимость) до текущей цены (уже заложенная маржа).
   Не для всех позиций есть надёжная себестоимость (HD-4, KKT-5, MARK-2 остаются рыночной догадкой без пересчёта) —
   такие позиции в панель маржи не включаются, их цена не меняется. */
var COST_HD_TICKET = 591;   // 1082 руб/час (1-я линия, без наценки) × 33 мин
var COST_C1_2H = 2472;      // 1236 руб/час (1С/Маркировка, без наценки) × 2 часа
var COST_ADMIN_2H = 2434;   // 1217 руб/час (админ, без наценки) × 2 часа

var COST = {
    HD_1: function (v) { return v.HD_1_01 * COST_HD_TICKET; },
    HD_2: function (v) { return v.HD_2_01 * COST_HD_TICKET; },
    KKT_1: function (v) { return v.KKT_1_01 * COST_HD_TICKET; },
    KKT_2: function (v) { return v.KKT_1_01 * COST_HD_TICKET; },
    KKT_3: function (v) { return v.KKT_3_05 * COST_HD_TICKET; },
    KKT_4: function (v) { return v.KKT_4_01 * COST_HD_TICKET; },
    KKT_6: function (v) { return (v.KKT_6_01 / 12) * COST_HD_TICKET; },
    MARK_3: function (v) { return v.MARK_3_01 * COST_HD_TICKET; },
    MARK_4: function (v) { return v.MARK_4_01 * COST_HD_TICKET; },
    INFRA_3: function (v) { return v.INFRA_3_01 * COST_ADMIN_2H; },
    C1_3: function () { return 1.5 * COST_C1_2H; },
    C1_4: function (v) { return v.C1_4_03 * COST_C1_2H; }
};

var PRODUCTS = {
    HD: ['HD_1', 'HD_2', 'HD_3', 'HD_4'],
    C1: ['C1_2', 'C1_3', 'C1_4', 'C1_5', 'C1_6'],
    KKT: ['KKT_1', 'KKT_2', 'KKT_3', 'KKT_4', 'KKT_5', 'KKT_6'],
    MARK: ['MARK_2', 'MARK_3', 'MARK_4'],
    INFRA: ['INFRA_1', 'INFRA_2', 'INFRA_3', 'INFRA_4', 'INFRA_5', 'INFRA_6']
};
var SVC_PRODUCTS = {
    HD: ['HD_1', 'HD_2', 'HD_4'],
    C1: ['C1_3', 'C1_4'],
    KKT: ['KKT_1', 'KKT_2', 'KKT_3', 'KKT_4', 'KKT_5', 'KKT_6'],
    MARK: ['MARK_2', 'MARK_3', 'MARK_4'],
    INFRA: ['INFRA_3']
};

function num(x) { x = parseFloat(x); return isFinite(x) ? x : 0; }

// Заполняет пропуски нулями, чтобы формулы не падали на undefined
function normalizeValues(raw) {
    var v = {}, k;
    for (k in raw) { v[k] = num(raw[k]); }
    return v;
}

function computeAll(rawValues, rawCli) {
    var v = normalizeValues(rawValues);
    var cli = {
        points: num(rawCli.CLI_0_02),
        staff: num(rawCli.CLI_0_04),
        revenue: num(rawCli.CLI_0_05),
        rateIT: num(rawCli.CLI_0_11),
        rate1C: num(rawCli.CLI_0_12),
        hoursPerDay: num(rawCli.CLI_0_13)
    };
    var result = { tco: {}, svc: {}, tcoTotal: {}, svcTotal: {}, v: v, cli: cli };
    var product;
    for (product in PRODUCTS) {
        var sum = 0, i;
        for (i = 0; i < PRODUCTS[product].length; i++) {
            var id = PRODUCTS[product][i];
            var val = TCO[id](v, cli);
            result.tco[id] = val;
            sum += val;
        }
        result.tcoTotal[product] = sum;
    }
    for (product in SVC_PRODUCTS) {
        var sum2 = 0, j;
        for (j = 0; j < SVC_PRODUCTS[product].length; j++) {
            var id2 = SVC_PRODUCTS[product][j];
            var t = TARIFF[id2];
            var val2 = t.volume(v, cli) * t.rate;
            result.svc[id2] = val2;
            sum2 += val2;
        }
        result.svcTotal[product] = sum2;
    }
    result.grandTco = 0; result.grandSvc = 0;
    for (product in result.tcoTotal) { result.grandTco += result.tcoTotal[product]; }
    for (product in result.svcTotal) { result.grandSvc += result.svcTotal[product]; }
    result.savingsTotal = result.grandTco - result.grandSvc;
    result.roi = result.grandSvc > 0 ? result.savingsTotal / result.grandSvc : 0;

    result.bottomHD = v.HD_5_02 + v.HD_5_07 * (v.HD_5_06 / 100);
    result.bottomC1 = v.C1_7_02 + v.HD_5_07 * (1 - v.HD_5_06 / 100);
    result.c1_7_03 = 100 - v.HD_5_06;

    result.savingsByProduct = {};
    for (product in result.tcoTotal) {
        result.savingsByProduct[product] = result.tcoTotal[product] - (result.svcTotal[product] || 0);
    }
    result.tier = computeTier(cli.points, rawCli.CLI_0_15);

    // Служебный расчёт для панели «маржа» — только по позициям, где известна себестоимость.
    var costTotal = 0, priceOfCostKnownTotal = 0, id3;
    for (id3 in COST) {
        costTotal += COST[id3](v, cli);
        priceOfCostKnownTotal += result.svc[id3] || 0;
    }
    result.marginCostTotal = costTotal;
    result.marginPriceTotal = priceOfCostKnownTotal;
    result.marginFixedTotal = result.grandSvc - priceOfCostKnownTotal;
    result.marginPct = costTotal > 0 ? (priceOfCostKnownTotal / costTotal - 1) * 100 : 0;

    return result;
}

// levelPct: 0 = себестоимость (без наценки), 100 = текущая цена (заложенная наценка). Можно и выше 100.
function svcAtMarginLevel(result, levelPct) {
    var k = levelPct / 100;
    var scaledPart = result.marginCostTotal + (result.marginPriceTotal - result.marginCostTotal) * k;
    return result.marginFixedTotal + scaledPart;
}

var LEGACY_STORAGE_KEY = 'retailAudit_v1';
var INDEX_KEY = 'retailAudit_index';
var DATA_PREFIX = 'retailAudit_data_';

var STATE = {
    step: 'intro',
    auditId: null,
    values: {},
    helpOpen: false
};

function genId() {
    return 'a' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function getIndex() {
    try {
        var raw = localStorage.getItem(INDEX_KEY);
        return raw ? JSON.parse(raw) : [];
    } catch (e) { return []; }
}
function setIndex(list) {
    try { localStorage.setItem(INDEX_KEY, JSON.stringify(list)); } catch (e) {}
}

// Переносит старый черновик (одна запись на весь браузер) в новый список аудитов —
// чтобы то, что уже было заполнено, не потерялось при переходе на список.
function migrateLegacyDraft() {
    var idx = getIndex();
    if (idx.length > 0) return;
    try {
        var raw = localStorage.getItem(LEGACY_STORAGE_KEY);
        if (!raw) return;
        var saved = JSON.parse(raw);
        if (!saved.values || Object.keys(saved.values).length === 0) return;
        var id = genId();
        localStorage.setItem(DATA_PREFIX + id, JSON.stringify({ values: saved.values, step: saved.step || 'CLI' }));
        idx.push({ id: id, name: saved.values.CLI_0_01 || '', points: saved.values.CLI_0_02 || '', updatedAt: Date.now() });
        setIndex(idx);
        localStorage.removeItem(LEGACY_STORAGE_KEY);
    } catch (e) {}
}

function loadState() {
    migrateLegacyDraft();
    STATE.step = 'intro';
    STATE.auditId = null;
    STATE.values = {};
}

function startNewAudit() {
    STATE.auditId = genId();
    STATE.values = {};
    STATE.step = 'CLI';
    saveState();
    render();
    window.scrollTo(0, 0);
}

function openAudit(id) {
    try {
        var raw = localStorage.getItem(DATA_PREFIX + id);
        if (!raw) return;
        var saved = JSON.parse(raw);
        STATE.auditId = id;
        STATE.values = saved.values || {};
        STATE.step = saved.step || 'CLI';
        render();
        window.scrollTo(0, 0);
    } catch (e) {}
}

function deleteAudit(id, ev) {
    if (ev) ev.stopPropagation();
    if (!confirm('Удалить этот аудит без возможности восстановления?')) return;
    try {
        localStorage.removeItem(DATA_PREFIX + id);
        setIndex(getIndex().filter(function (a) { return a.id !== id; }));
    } catch (e) {}
    render();
}

function backToLibrary() {
    STATE.auditId = null;
    STATE.step = 'intro';
    render();
    window.scrollTo(0, 0);
}

var saveTimer = null;
function saveState() {
    if (!STATE.auditId) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
        try {
            localStorage.setItem(DATA_PREFIX + STATE.auditId, JSON.stringify({ values: STATE.values, step: STATE.step }));
            var idx = getIndex();
            var entry = null;
            for (var i = 0; i < idx.length; i++) { if (idx[i].id === STATE.auditId) { entry = idx[i]; break; } }
            if (!entry) { entry = { id: STATE.auditId }; idx.unshift(entry); }
            var nameBase = STATE.values.CLI_0_01 || '';
            entry.name = (STATE.auditId === EXAMPLE_AUDIT_ID ? 'Пример: ' : '') + nameBase;
            entry.points = STATE.values.CLI_0_02 || '';
            entry.updatedAt = Date.now();
            setIndex(idx);
            var ind = document.getElementById('saveIndicator');
            if (ind) {
                ind.textContent = 'Черновик сохранён';
                ind.classList.add('show');
                setTimeout(function () { ind.classList.remove('show'); }, 1500);
            }
        } catch (e) { /* тихо игнорируем — не критично для работы формы */ }
    }, 400);
}

function fmtMoney(n) {
    n = Math.round(n || 0);
    var neg = n < 0; n = Math.abs(n);
    var s = String(n).replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
    return (neg ? '−' : '') + s + ' ₽';
}
function fmtNum(n) {
    n = Math.round((n || 0) * 10) / 10;
    return String(n).replace('.', ',');
}
function fmtPercent(x) {
    return Math.round((x || 0) * 100) + '%';
}

// ---------- Порядок шагов мастера ----------
var PRODUCT_STEPS = ['HD', 'C1', 'KKT', 'MARK', 'INFRA'];
var STEP_ORDER = ['intro', 'CLI'].concat(PRODUCT_STEPS).concat(['tariffs', 'results']);

function blocksForStep(step) {
    if (step === 'CLI') return BLOCKS.filter(function (b) { return b.product === 'CLI'; });
    return BLOCKS.filter(function (b) { return b.product === step; });
}

function currentTier() {
    return computeTier(num(STATE.values.CLI_0_02), STATE.values.CLI_0_15);
}

function isBlockCollapsedByDefault(block) {
    if (block.tier !== 'optional') return false;
    var tier = currentTier();
    return tier === 'express';
}

// ---------- Проверка заполненности ----------
function isFieldEmpty(f) {
    var val = STATE.values[f.id];
    return val === undefined || val === null || val === '';
}
function isFieldMissing(f) {
    return !!f.required && isFieldEmpty(f);
}
function missingRequiredFields(blocks) {
    var out = [];
    blocks.forEach(function (b) {
        b.fields.forEach(function (f) {
            if (isFieldMissing(f)) out.push(f);
        });
    });
    return out;
}

// ---------- Отрисовка поля ----------
function renderField(f) {
    var val = STATE.values[f.id];
    var missing = isFieldMissing(f);
    var reqMark = f.required ? '<span class="field-required" title="Нужно для расчёта">*</span>' : '';
    var hint = f.hint ? '<div class="field-hint">' + escapeHtml(f.hint) + '</div>' : '';
    var input = '';
    if (f.type === 'N' || f.type === 'P') {
        var v2 = (val === undefined || val === null) ? '' : val;
        var suffix = f.type === 'P' ? '<span class="field-suffix">%</span>' : '';
        input = '<div class="field-input-wrap"><input class="field-input" type="number" inputmode="decimal" ' +
            'data-field="' + f.id + '" value="' + escapeAttr(v2) + '" placeholder="0">' + suffix + '</div>';
    } else if (f.type === 'D') {
        var y = val === 'yes' ? ' selected' : '';
        var n2 = val === 'no' ? ' selected' : '';
        input = '<select class="field-input" data-field="' + f.id + '">' +
            '<option value=""' + (val ? '' : ' selected') + '>— выберите —</option>' +
            '<option value="yes"' + y + '>Да</option>' +
            '<option value="no"' + n2 + '>Нет</option></select>';
    } else if (f.type === 'SELECT') {
        var opts = f.options.map(function (o) {
            var sel = (val === o[0]) || (!val && o[0] === 'auto') ? ' selected' : '';
            return '<option value="' + o[0] + '"' + sel + '>' + escapeHtml(o[1]) + '</option>';
        }).join('');
        input = '<select class="field-input" data-field="' + f.id + '">' + opts + '</select>';
    } else {
        var vt = val === undefined || val === null ? '' : val;
        input = '<input class="field-input" type="text" data-field="' + f.id + '" value="' + escapeAttr(vt) + '">';
    }
    return '<label class="field' + (missing ? ' field-missing' : '') + '" data-field-wrap="' + f.id + '">' +
        '<span class="field-label">' + escapeHtml(f.label) + reqMark + '</span>' +
        input + hint +
        '</label>';
}

function renderProgressBadge(blocks) {
    var total = 0, filled = 0;
    blocks.forEach(function (b) {
        b.fields.forEach(function (f) {

            if (!isFieldEmpty(f)) filled++;

    });
    if (total === 0) return '';
    var done = filled === total;
    return '<div class="progress-badge' + (done ? ' progress-done' : '') + '">' +
        (done ? 'Готово: ' : 'Заполнено: ') + filled + ' из ' + total + ' обязательных полей' +

// ---------- Диаграммы (инлайн SVG) ----------
// Короткие названия для диаграмм — длинные ("Служба поддержки пользователей") не влезают
// в подпись слева и обрезаются, полное название остаётся везде в тексте вопросов.
var CHART_SHORT_NAME = { HD: 'Поддержка', C1: '1С', KKT: 'Кассы', MARK: 'Маркировка', INFRA: 'Компьютеры/сеть' };

function barChart(byProduct) {
    var order = ['HD','C1','KKT','MARK','INFRA'];
    var items = order.map(function (p) { return { name: CHART_SHORT_NAME[p], val: byProduct[p] || 0 }; });
    var max = Math.max.apply(null, items.map(function (i) { return Math.abs(i.val); }).concat([1]));
    var w = 640, rowH = 40, padL = 190, padR = 100, h = items.length * rowH + 20;
    var midX = padL + (w - padL - padR) / 2;
    var scale = (w - padL - padR) / 2 / max;
    var bars = items.map(function (item, i) {
        var y = 16 + i * rowH;
        var barW = Math.abs(item.val) * scale;
        var x = item.val >= 0 ? midX : midX - barW;
        var color = item.val >= 0 ? 'var(--good)' : 'var(--bad)';
        return '<text x="' + (padL - 12) + '" y="' + (y + 14) + '" text-anchor="end" class="chart-label">' + escapeHtml(item.name) + '</text>' +
            '<rect x="' + x.toFixed(1) + '" y="' + y + '" width="' + Math.max(barW, 1).toFixed(1) + '" height="20" rx="4" fill="' + color + '"></rect>' +
            '<text x="' + (item.val >= 0 ? x + barW + 8 : x - 8) + '" y="' + (y + 14) + '" text-anchor="' + (item.val >= 0 ? 'start' : 'end') + '" class="chart-value">' + fmtMoney(item.val) + '</text>';
    }).join('');
    return '<svg class="chart" viewBox="0 0 ' + w + ' ' + h + '" role="img" aria-label="Экономия по продуктам">' +
        '<line x1="' + midX + '" y1="8" x2="' + midX + '" y2="' + (h - 8) + '" class="chart-axis"></line>' +
        bars + '</svg>';
}

function compareChart(tco, svc) {
    var order = ['HD','C1','KKT','MARK','INFRA'];
    var items = order.map(function (p) { return { name: CHART_SHORT_NAME[p], tco: tco[p] || 0, svc: svc[p] || 0 }; });
    var max = Math.max.apply(null, items.map(function (i) { return Math.max(i.tco, i.svc); }).concat([1]));
    var w = 640, rowH = 56, padL = 190, padR = 110, h = items.length * rowH + 20;
    var scale = (w - padL - padR) / max;
    var bars = items.map(function (item, i) {
        var y = 12 + i * rowH;
        var w1 = item.tco * scale, w2 = item.svc * scale;
        return '<text x="' + (padL - 12) + '" y="' + (y + 22) + '" text-anchor="end" class="chart-label">' + escapeHtml(item.name) + '</text>' +
            '<rect x="' + padL + '" y="' + y + '" width="' + Math.max(w1,1).toFixed(1) + '" height="16" rx="3" fill="var(--ink-muted)"></rect>' +
            '<text x="' + (padL + w1 + 8) + '" y="' + (y + 13) + '" class="chart-value-sm">' + fmtMoney(item.tco) + '</text>' +
            '<rect x="' + padL + '" y="' + (y + 20) + '" width="' + Math.max(w2,1).toFixed(1) + '" height="16" rx="3" fill="var(--brand)"></rect>' +
            '<text x="' + (padL + w2 + 8) + '" y="' + (y + 33) + '" class="chart-value-sm">' + fmtMoney(item.svc) + '</text>';
    }).join('');
    return '<div class="chart-legend"><span><i class="dot" style="background:var(--ink-muted)"></i>Сейчас у клиента</span><span><i class="dot" style="background:var(--brand)"></i>С нами</span></div>' +
        '<svg class="chart" viewBox="0 0 ' + w + ' ' + h + '" role="img" aria-label="Сравнение текущей стоимости и стоимости услуг">' + bars + '</svg>';
}

// ---------- Экспорт ----------
function exportJson() {
    var data = { savedAt: new Date().toISOString(), values: STATE.values };
    var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'audit-' + (STATE.values.CLI_0_01 || 'клиент').replace(/[^a-zA-Zа-яА-Я0-9]+/g, '_') + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
}

function escapeHtml(s) {
    s = (s === undefined || s === null) ? '' : String(s);
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}
function escapeAttr(s) {
    return escapeHtml(s).replace(/"/g, '&quot;');
}

'<p>Дальше идёте по порядку: служба поддержки, 1С, кассы, маркировка, компьютеры и сеть. Часть блоков помечена "можно пропустить на маленькой сети" — ' +
'если у клиента это направление реально есть (например, у маленькой сети всё равно бывает сложная маркировка), лучше развернуть и заполнить — это ' +
'реальные деньги, которые не стоит терять только из-за того, что сеть небольшая.</p>' +
'<p>Отдельно обратите внимание на блоки "Кто сейчас занимается поддержкой" и "Кто сейчас занимается 1С" — это не лишние вопросы, а проверка тех же ' +

'Если сильно расходятся — стоит переспросить у клиента, а не брать первую попавшуюся.</p>' +
'<p>Если у клиента есть сотрудник, который одновременно занимается и поддержкой пользователей, и 1С — не делите его зарплату сами. Спросите у ' +
'руководителя клиента, сколько процентов своего времени в неделю он тратит именно на поддержку пользователей — остальное инструмент посчитает сам.</p>' +

'<h3>Шаг 4. Наши тарифы</h3>' +
'<p>Тарифы уже настроены заранее — трогать их на выезде не нужно. Достаточно верно внести количество (обращений, касс, пользователей и т.д.) на предыдущих шагах — ' +
'стоимость посчитается сама.</p>' +

'<h3>Шаг 5. Результат</h3>' +
'<p>В конце — сколько клиент тратит сейчас, сколько будет стоить с нами, экономия в месяц и в год, и насколько это выгодно в процентах. Ниже — заготовка ' +
'отчёта под разных людей у клиента (собственник, операционный директор, финансовый директор, ИТ-директор) — у каждого свой главный вопрос, и при показе ' +

'<p>Не знают стоимость часа специалиста — спросите расчётный лист по зарплате у бухгалтера, а не берите оклад "как есть". Если и это недоступно сразу — ' +

'<p>Не помнят точных цифр — берите оценку "на глаз" от сотрудника клиента, который в теме, а не придумывайте сами.</p>' +

'<h3>Как сохранить и передать результат</h3>' +
'<p>Всё сохраняется в этом браузере автоматически по ходу заполнения — специально нажимать ничего не нужно. Не работайте в приватном/анонимном окне ' +
'браузера и не очищайте историю до конца работы с клиентом, иначе черновик пропадёт.</p>' +

var STEP_META = {
    intro:   { title: 'Начало', short: 'Начало' },
    CLI:     { title: 'Профиль клиента', short: 'Клиент' },
    HD:      { title: 'Служба поддержки', short: 'Поддержка' },
    C1:      { title: 'Сопровождение 1С', short: '1С' },
    KKT:     { title: 'Кассы', short: 'Кассы' },
    MARK:    { title: 'Маркировка', short: 'Маркировка' },
    INFRA:   { title: 'Компьютеры и сеть', short: 'Сеть' },
    tariffs: { title: 'Наши тарифы', short: 'Тарифы' },
    results: { title: 'Результаты', short: 'Итог' }
};

function stepIndex(step) { return STEP_ORDER.indexOf(step); }

function goToStep(step) {
    STATE.step = step;
    saveState();
    render();
    window.scrollTo(0, 0);
}

STATE.skipConfirmed = {};

function currentStepBlocks() {
    var step = STATE.step;
    if (step === 'CLI') return blocksForStep('CLI');
    if (PRODUCT_STEPS.indexOf(step) !== -1) return blocksForStep(step);
    return [];
}

function goNext() {
    var i = stepIndex(STATE.step);
    if (i >= STEP_ORDER.length - 1) return;
    var missing = missingRequiredFields(currentStepBlocks());
    if (missing.length > 0) {
        if (STATE.step === 'CLI') { showMissingWarning(missing, false); return; }
        if (!STATE.skipConfirmed[STATE.step]) { showMissingWarning(missing, true); return; }
    }
    goToStep(STEP_ORDER[i + 1]);
}

function showMissingWarning(missing, allowSkip) {
    var box = document.getElementById('missingWarning');
    if (!box) return;
    var list = missing.slice(0, 8).map(function (f) { return '<li>' + escapeHtml(f.label) + '</li>'; }).join('');
    var more = missing.length > 8 ? '<li>… и ещё ' + (missing.length - 8) + '</li>' : '';
    box.innerHTML = '<div class="warn-card">' +
        '<div class="warn-title">Не заполнено ' + missing.length + ' поле(й), нужных для расчёта</div>' +
        '<ul class="warn-list">' + list + more + '</ul>' +
        (allowSkip
            ? '<button class="btn btn-outline" onclick="skipAndContinue()">Всё равно продолжить</button>'
            : '<div class="warn-hint">Без этих данных ничего не посчитается — сначала заполните профиль клиента.</div>') +
        '</div>';
    box.scrollIntoView({ block: 'center' });
    var firstMissing = document.querySelector('[data-field-wrap="' + missing[0].id + '"] .field-input');
    if (firstMissing) firstMissing.focus();
}

function skipAndContinue() {
    STATE.skipConfirmed[STATE.step] = true;
    goNext();
}

function goPrev() {
    var i = stepIndex(STATE.step);
    if (i > 0) goToStep(STEP_ORDER[i - 1]);
}

function renderRail() {
    var items = STEP_ORDER.filter(function (s) { return s !== 'intro'; }).map(function (s, idx) {
        var active = s === STATE.step ? ' active' : '';
        var done = stepIndex(s) < stepIndex(STATE.step) ? ' done' : '';
        return '<button class="rail-item' + active + done + '" data-goto="' + s + '">' +
            '<span class="rail-num">' + (idx + 1) + '</span>' +
            '<span class="rail-name">' + STEP_META[s].short + '</span></button>';
    }).join('');
    return '<nav class="rail">' +
        '<button class="rail-back" onclick="backToLibrary()" title="К списку аудитов">← Список</button>' +
        items + '</nav>';
}

function fmtDate(ts) {
    if (!ts) return '';
    var d = new Date(ts);
    var pad = function (n) { return (n < 10 ? '0' : '') + n; };
    return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear() + ', ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}

function renderIntro() {
    var audits = getIndex().slice().sort(function (a, b) { return (b.updatedAt || 0) - (a.updatedAt || 0); });
    var listHtml = audits.length === 0
        ? '<div class="audit-empty">Пока нет ни одного сохранённого аудита в этом браузере.</div>'
        : audits.map(function (a) {
            var name = a.name ? escapeHtml(a.name) : 'Без названия (черновик)';
            var pts = a.points ? a.points + ' магазин(ов) · ' : '';
            return '<div class="audit-item" onclick="openAudit(\'' + a.id + '\')">' +
                '<div class="audit-item-main">' +
                '<div class="audit-item-name">' + name + '</div>' +
                '<div class="audit-item-meta">' + pts + 'изменено ' + fmtDate(a.updatedAt) + '</div>' +
                '</div>' +
                '<button class="audit-item-del" title="Удалить" onclick="deleteAudit(\'' + a.id + '\', event)">✕</button>' +
                '</div>';
        }).join('');

    return '<div class="intro">' +
        '<div class="intro-logo">' + LOGO_SVG + '</div>' +
        '<h1>Аудит ИТ розничной сети</h1>' +
        '<p class="lead">Вы приезжаете к клиенту, заполняете несколько простых вопросов по его кассам, компьютерам, 1С и поддержке пользователей — ' +
        'а дальше инструмент сам считает, сколько клиент сейчас тратит, сколько будет стоить с нами, и какая получится выгода.</p>' +
        '<div class="intro-columns">' +
        '<div class="intro-col-new">' +
        '<div class="intro-col-title">Новый клиент</div>' +
        '<button class="btn btn-lg" onclick="startNewAudit()">Начать новый аудит</button>' +
        '<button class="btn btn-outline" onclick="toggleHelp(true)">Как этим пользоваться</button>' +
        '<p class="muted small"><button class="link-btn" onclick="loadExample()">Посмотреть на готовом примере</button> — заполнит вымышленный магазин, чтобы сразу увидеть, как выглядит результат.</p>' +
        '</div>' +
        '<div class="intro-col-list">' +
        '<div class="intro-col-title">Сохранённые аудиты (в этом браузере)</div>' +
        '<div class="audit-list">' + listHtml + '</div>' +
        '</div>' +
        '</div>' +
        '</div>';
}

var EXAMPLE_AUDIT_ID = 'example-gardenia';
function loadExample() {
    if (typeof EXAMPLE_DATA === 'undefined') return;
    STATE.auditId = EXAMPLE_AUDIT_ID;  // фиксированный id — повторный клик обновит ту же запись, а не создаст дубль
    STATE.values = {};
    var k;
    for (k in EXAMPLE_DATA) { STATE.values[k] = EXAMPLE_DATA[k]; }
    STATE.step = 'results';
    saveState();
    render();
    window.scrollTo(0, 0);
}

function render() {
    var root = document.getElementById('app');
    var step = STATE.step;
    var body = '';
    if (step === 'intro') {
        body = renderIntro();
    } else if (step === 'CLI') {
        body = renderProfileStep();
    } else if (PRODUCT_STEPS.indexOf(step) !== -1) {
        body = renderProductStep(step);
    } else if (step === 'tariffs') {
        body = renderTariffsStep();
    } else if (step === 'results') {
        var r = computeAll(STATE.values, STATE.values);
        STATE.lastResult = r;
        body = renderResultsStep(r);
    }

    var showRail = step !== 'intro';
    var i = stepIndex(step);
    var showsFields = step === 'CLI' || PRODUCT_STEPS.indexOf(step) !== -1;
    var missingBox = showsFields ? '<div id="missingWarning"></div>' : '';
    var nav = step === 'intro' ? '' :
        '<div class="step-nav no-print">' +
        '<button class="btn btn-outline" onclick="goPrev()"' + (i <= 1 ? ' disabled' : '') + '>Назад</button>' +
        '<div class="step-progress">' + i + ' из ' + (STEP_ORDER.length - 1) + '</div>' +
        (step === 'results' ? '' : '<button class="btn" onclick="goNext()">Дальше</button>') +
        '</div>';

    root.innerHTML =
        (showRail ? renderRail() : '') +
        '<main class="content' + (step === 'intro' ? ' content-intro' : '') + '">' + missingBox + body + nav + '</main>';

    var activeRailItem = root.querySelector('.rail-item.active');
    if (activeRailItem && activeRailItem.scrollIntoView) {
        activeRailItem.scrollIntoView({ block: 'nearest', inline: 'center' });
    }
}

// ---------- Помощь / инструкция ----------
// HELP_HTML определён в app-help.js (должен загружаться раньше этого файла)

function toggleHelp(open) {
    STATE.helpOpen = open === undefined ? !STATE.helpOpen : open;
    document.getElementById('helpOverlay').classList.toggle('open', STATE.helpOpen);
}

// Служебный ползунок «маржа» на итоговом экране — пересчитывает цену/экономию в диапазоне
// от себестоимости (0%) до текущей заложенной наценки (100%), не трогая сохранённые данные аудита.
function onMarginSliderChange(levelPct) {
    var r = STATE.lastResult;
    if (!r) return;
    var adjustedSvc = svcAtMarginLevel(r, levelPct);
    var adjustedSavings = r.grandTco - adjustedSvc;
    var adjustedRoi = adjustedSvc > 0 ? adjustedSavings / adjustedSvc : 0;
    document.getElementById('marginPreviewSvc').textContent = fmtMoney(adjustedSvc);
    document.getElementById('marginPreviewSavings').textContent = fmtMoney(adjustedSavings);
    document.getElementById('marginPreviewRoi').textContent = fmtPercent(adjustedRoi);
    var label = levelPct == 100 ? 'Наценка: ' + Math.round(r.marginPct) + '% (текущая)' :
        levelPct == 0 ? 'Наценка: 0% (в ноль, только себестоимость)' :
        'Наценка: ' + Math.round(r.marginPct * levelPct / 100) + '%';
    document.getElementById('marginSliderLabel').textContent = label;
}

// ---------- Обработка ввода (делегирование событий) ----------
function handleFieldChange(e) {
    var t = e.target;
    if (!t.hasAttribute('data-field')) return;
    var id = t.getAttribute('data-field');
    STATE.values[id] = t.value;
    STATE.skipConfirmed[STATE.step] = false;
    var wrap = t.closest('.field');
    if (wrap) wrap.classList.toggle('field-missing', false);
    saveState();
    var pbadge = document.querySelector('.progress-badge');
    if (pbadge) {
        var stepBlocks = currentStepBlocks();
        var newBadge = renderProgressBadge(stepBlocks);
        if (newBadge) {
            var tmp = document.createElement('div');
            tmp.innerHTML = newBadge;
            pbadge.className = tmp.firstChild.className;
            pbadge.textContent = tmp.firstChild.textContent;
        }
    }
    if (id === 'CLI_0_02' || id === 'CLI_0_15') {
        var box = document.querySelector('.tier-result');
        if (box) {
            var tier = currentTier();
            box.querySelector('.tier-result-value').textContent = TIER_LABEL[tier];
            box.querySelector('.tier-result-explain').textContent = tierExplain(tier);
        }
    }
}

document.addEventListener('input', function (e) {
    if (e.target.matches('input[data-field]')) handleFieldChange(e);
});
document.addEventListener('change', function (e) {
    if (e.target.matches('select[data-field]')) handleFieldChange(e);
});
document.addEventListener('click', function (e) {
    var railBtn = e.target.closest('[data-goto]');
    if (railBtn) { goToStep(railBtn.getAttribute('data-goto')); return; }
});

document.addEventListener('DOMContentLoaded', function () {
    loadState();
    document.getElementById('helpBody').innerHTML = HELP_HTML;
    render();
});
</script>
</body>
